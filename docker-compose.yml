# nv-monitor — Docker Compose for headless DGX Spark cluster monitoring
#
# Usage:
#   docker compose up -d
#
# Requires nvidia-container-toolkit:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  nv-monitor:
    image: taoofshawn/nv-monitor:latest
    build:
      context: .
    container_name: nv-monitor
    restart: unless-stopped
    ports:
      - "9101:9101"
    volumes:
      # Mount host /proc and /sys read-only for CPU, memory, and thermal readings.
      # The binary reads /proc/stat, /proc/meminfo, /proc/loadavg, /sys/class/thermal/, etc.
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      # NVIDIA GPU access via nvidia-container-toolkit
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    # Required for GPU device access
    runtime: nvidia
    # For full process-level detail (GPU processes), add:
    # pid: "host"
    # Alternatively, the binary works with just NVML device queries without
    # host PID namespace — process listing will be limited to container processes.
    #
    # For containers running as non-root:
    # If the NVIDIA container toolkit is set up for non-root access, uncomment:
    # user: "1000:1000"
    #
    # Note: reading /proc and /sys from a container does not require
    # special capabilities when volumes are mounted as above.

